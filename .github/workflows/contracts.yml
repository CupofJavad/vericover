name: Contract Tests

on:
  push:
    branches: [master, main, feature/digital-warranties]
    paths: ["contracts/**"]
  pull_request:
    paths: ["contracts/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge build
        working-directory: contracts
      - run: forge test -vv
        working-directory: contracts